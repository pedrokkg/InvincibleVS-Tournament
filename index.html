<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible VS - Tournament</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="logo2.png" href="img/logo2.png">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho Principal do Site -->
        <header>
            <img src="img/logoVS.png" alt="Invincible VS Logo" class="main-logo">
            <div class="subtitle">TORNEIO MATA-MATA</div>
        </header>

        <section id="setup-section">
            <div class="card">
                <h2>CONFIGURAÇÃO</h2>
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="text" id="tournamentName" placeholder="NOME DO TORNEIO (Ex: Copa Invencível)">
                </div>

                <h2>CADASTRAR DESAFIANTE</h2>
                <div class="input-group">
                    <input type="text" id="playerName" placeholder="NOME DO JOGADOR">
                    
                    <p class="select-title">ESCOLHA O AVATAR:</p>
                    <div class="image-selector" id="imageSelector"></div>

                    <button onclick="addPlayer()">ADICIONAR</button>
                </div>

                <ul id="playerList" class="player-list"></ul>

                <button class="btn-main" onclick="startTournament()">INICIAR TORNEIO</button>
            </div>
        </section>

        <section id="bracket-section" class="hidden">
            <!-- ÁREA DE EXPORTAÇÃO -->
            <div id="exportArea" class="export-area">
                <div class="export-header">
                    <!-- Logo na imagem exportada -->
                    <img src="img/logoVS.png" alt="Invincible VS Logo" class="export-logo">
                    <h2 id="displayTournamentName">TORNEIO MATA-MATA</h2>
                </div>
                
                <div class="bracket-wrapper">
                    <div class="bracket-container" id="bracketContainer">
                        <!-- O JS preencherá aqui -->
                    </div>
                </div>

                <div id="exportDateTime" class="export-datetime"></div>
            </div>

            <div class="actions">
                <button onclick="printTournament()" class="btn-share">SALVAR</button>
                <button onclick="location.reload()" class="btn-restart">NOVO TORNEIO</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
